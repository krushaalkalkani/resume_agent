# Configuration for the resume agent.

models:
  # Used for job-tailoring (Phase 3) and for auto-fixing LaTeX compile errors.
  tailor:  "claude-opus-4-8"
  reflect: "claude-sonnet-4-6"

render:
  template: "library/jake.tex.j2"   # active template; see templates/library/README.md
  max_pages: 1          # reflection step flags the resume if it exceeds this
  output_basename: "resume"
